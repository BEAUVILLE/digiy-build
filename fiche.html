<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#061b14"/>
<meta name="description" content="Fiche publique DIGIY BUILD : service, zone, contact direct, paiement direct au professionnel, 0% commission."/>
<title>Fiche service — DIGIY BUILD</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#061b14;
  --bg2:#0a2b1f;
  --line:rgba(255,255,255,.14);
  --soft:rgba(255,255,255,.06);
  --text:#eafff1;
  --muted:rgba(234,255,241,.76);
  --gold:#facc15;
  --orange:#f97316;
  --green:#22c55e;
  --shadow:0 20px 55px rgba(0,0,0,.45);
  --font:Outfit,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100%;
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(900px 420px at 10% -5%,rgba(250,204,21,.14),transparent 60%),
    radial-gradient(900px 420px at 92% 0%,rgba(249,115,22,.13),transparent 60%),
    radial-gradient(900px 420px at 100% 100%,rgba(34,197,94,.12),transparent 60%),
    linear-gradient(145deg,var(--bg),var(--bg2));
}

body{
  padding:14px 14px calc(92px + env(safe-area-inset-bottom,0px));
}

a{color:inherit;text-decoration:none}

.wrap{
  width:min(100%,980px);
  margin:0 auto;
}

.hero{
  position:relative;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:30px;
  background:linear-gradient(145deg,rgba(11,42,31,.96),rgba(6,35,25,.96));
  box-shadow:var(--shadow);
}

.cover{
  min-height:340px;
  position:relative;
  background:
    radial-gradient(circle at top right,rgba(250,204,21,.20),transparent 35%),
    radial-gradient(circle at bottom left,rgba(249,115,22,.24),transparent 38%),
    linear-gradient(145deg,#153428,#0a2118);
  display:flex;
  align-items:flex-end;
}

.cover img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:saturate(1.04) contrast(1.02);
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.22) 52%,rgba(0,0,0,.05)),
    linear-gradient(to right,rgba(0,0,0,.48),rgba(0,0,0,0));
}

.coverInner{
  position:relative;
  z-index:2;
  padding:22px;
  width:100%;
}

.logoLine{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:18px;
  background:#fff;
  object-fit:cover;
  border:1px solid rgba(250,204,21,.35);
  box-shadow:0 12px 28px rgba(0,0,0,.28);
}

.kicker{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 11px;
  border-radius:999px;
  border:1px solid rgba(250,204,21,.32);
  background:rgba(6,24,18,.72);
  color:#fff3b2;
  font-size:12px;
  font-weight:1000;
  letter-spacing:.08em;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
}

h1{
  margin:0;
  max-width:780px;
  font-size:clamp(34px,7vw,64px);
  line-height:.94;
  letter-spacing:-.045em;
  font-weight:1000;
  color:#fff;
  text-shadow:0 8px 24px rgba(0,0,0,.36);
}

.trade{
  margin-top:10px;
  color:#fff3b2;
  font-size:clamp(18px,3vw,24px);
  line-height:1.25;
  font-weight:1000;
}

.meta{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.meta span{
  display:inline-flex;
  align-items:center;
  min-height:34px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#eafff1;
  font-size:13px;
  font-weight:900;
}

.main{
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:14px;
  margin-top:14px;
}

.card{
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(11,42,31,.78);
  box-shadow:var(--shadow);
  padding:16px;
}

.card h2{
  margin:0 0 10px;
  color:#fff3b2;
  font-size:22px;
  font-weight:1000;
  letter-spacing:-.02em;
}

.text{
  color:#eefcf3;
  font-size:16px;
  line-height:1.72;
  font-weight:780;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.chip{
  display:inline-flex;
  align-items:center;
  min-height:34px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.055);
  color:#eafff1;
  font-size:12px;
  font-weight:900;
}

.chip.gold{
  border-color:rgba(250,204,21,.30);
  background:rgba(250,204,21,.10);
  color:#fff3b2;
}

.chip.ok{
  border-color:rgba(34,197,94,.36);
  background:rgba(34,197,94,.12);
  color:#bbf7d0;
}

.actions{
  display:grid;
  gap:10px;
  margin-top:12px;
}

.btn{
  min-height:56px;
  border-radius:17px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.065);
  color:#eafff1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  padding:13px 14px;
  font-size:15px;
  font-weight:1000;
  text-align:center;
}

.btn.primary{
  background:linear-gradient(135deg,var(--orange),var(--gold));
  color:#111;
  border-color:rgba(250,204,21,.34);
  box-shadow:0 12px 28px rgba(249,115,22,.22);
}

.btn.green{
  background:linear-gradient(135deg,var(--green),var(--gold));
  color:#062015;
  border-color:rgba(34,197,94,.28);
  box-shadow:0 12px 28px rgba(34,197,94,.16);
}

.btn.secondary{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.14);
  color:#eafff1;
}

.infoLine{
  display:grid;
  gap:6px;
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(250,204,21,.20);
  background:rgba(250,204,21,.055);
  margin-top:10px;
}

.infoLine b{
  color:#fff3b2;
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
}

.infoLine span{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
  font-weight:850;
  word-break:break-word;
}

.qrBox{
  display:grid;
  place-items:center;
  min-height:230px;
  border-radius:20px;
  border:1px dashed rgba(250,204,21,.32);
  background:rgba(0,0,0,.14);
  padding:14px;
  margin-top:12px;
}

.qrBox img{
  width:min(220px,100%);
  height:auto;
  border-radius:16px;
  background:#fff;
  padding:10px;
}

.status{
  border:1px solid var(--line);
  border-radius:22px;
  background:rgba(11,42,31,.82);
  box-shadow:var(--shadow);
  padding:18px;
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
  font-weight:850;
}

.status b{color:#fff3b2}

.footer{
  margin-top:14px;
  text-align:center;
  color:rgba(234,255,241,.58);
  font-size:12px;
  line-height:1.6;
  font-weight:800;
}

.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9998;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px));
  background:rgba(6,27,20,.94);
  border-top:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
}

.bottom-inner{
  width:min(760px,100%);
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}

.bottom-nav a{
  min-height:54px;
  border-radius:14px;
  display:grid;
  place-items:center;
  align-content:center;
  gap:2px;
  color:rgba(234,255,241,.78);
  font-size:11px;
  font-weight:1000;
  text-align:center;
  border:1px solid transparent;
  text-decoration:none;
  padding:0 4px;
}

.bottom-nav a.active{
  background:linear-gradient(135deg,var(--orange),var(--gold));
  color:#111;
}

.ico{font-size:18px;line-height:1}

@media(max-width:820px){
  .main{grid-template-columns:1fr}
  .cover{min-height:310px}
}

@media(max-width:560px){
  body{padding:10px 10px calc(92px + env(safe-area-inset-bottom,0px))}
  .coverInner{padding:18px}
  .hero,.card,.status{border-radius:22px}
  h1{font-size:clamp(32px,11vw,48px)}
}
</style>
</head>

<body>
<div class="wrap" id="app">
  <div class="status">
    Chargement de la fiche publique BUILD…
  </div>
</div>

<nav class="bottom-nav" aria-label="Navigation rapide BUILD">
  <div class="bottom-inner">
    <a href="./index.html"><span class="ico">🏠</span><span>Accueil</span></a>
    <a href="./listing.html"><span class="ico">👁️</span><span>Profils</span></a>
    <a href="./request.html"><span class="ico">📄</span><span>Besoin</span></a>
    <a href="./track.html"><span class="ico">🔎</span><span>Suivi</span></a>
    <a class="active" href="./fiche.html"><span class="ico">🌍</span><span>Fiche</span></a>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(() => {
  "use strict";

  const SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
  const PUBLIC_TABLE = "digiy_build_public_profiles";
  const LOGO = "https://digiylyfe.net/wp-content/uploads/2026/03/digiylyfe_logo_qr.jpeg";
  const DEFAULT_PHOTO = LOGO;

  const $app = document.getElementById("app");

  function text(v){ return String(v ?? "").trim(); }

  function normSlug(v){
    return String(v || "")
      .trim()
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/\s+/g,"-")
      .replace(/[^a-z0-9-]/g,"")
      .replace(/-+/g,"-")
      .replace(/^-|-$/g,"");
  }

  function escapeHtml(v){
    return String(v ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  function maybeUrl(v){
    const raw = text(v);
    if(!raw) return "";
    try{
      const url = new URL(raw);
      ["phone","tel","owner_phone","contact_phone","whatsapp","return","from","pin","token"].forEach((key)=>{
        url.searchParams.delete(key);
      });
      return url.toString();
    }catch(_){
      return "";
    }
  }

  function firstOf(obj, keys, fallback=""){
    for(const key of keys){
      if(!obj || !(key in obj)) continue;
      const value = obj[key];
      if(value === null || value === undefined) continue;
      if(typeof value === "string" && value.trim() === "") continue;
      return value;
    }
    return fallback;
  }

  function parseTags(value){
    if(Array.isArray(value)) return value.map(text).filter(Boolean);

    const raw = text(value);
    if(!raw) return [];

    if(raw.startsWith("[") && raw.endsWith("]")){
      try{
        const arr = JSON.parse(raw);
        if(Array.isArray(arr)) return arr.map(text).filter(Boolean);
      }catch(_){}
    }

    return raw.split(",").map(text).filter(Boolean);
  }

  function normPhone(value){
    const raw = String(value || "").trim();
    const digits = raw.replace(/[^\d]/g,"");
    return digits;
  }

  function waLink(phone, profile){
    const p = normPhone(phone);
    if(!p) return "";

    const msg = [
      "Bonjour, je viens de voir votre fiche DIGIY BUILD.",
      profile?.display_name ? "Nom : " + profile.display_name : "",
      profile?.trade ? "Service : " + profile.trade : "",
      "Je souhaite vous contacter."
    ].filter(Boolean).join("\n");

    return "https://wa.me/" + encodeURIComponent(p) + "?text=" + encodeURIComponent(msg);
  }

  function requestUrl(profile){
    const url = new URL("./request.html", location.href);
    if(profile.display_name) url.searchParams.set("nom", profile.display_name);
    if(profile.trade) url.searchParams.set("metier", profile.trade);
    if(profile.city) url.searchParams.set("ville", profile.city);
    return url.pathname + url.search + url.hash;
  }

  function listingUrl(profile){
    const url = new URL("./listing.html", location.href);
    if(profile.slug) url.searchParams.set("slug", profile.slug);
    return url.pathname + url.search + url.hash;
  }

  function qrUrl(){
    const url = new URL(location.href);
    return "https://quickchart.io/qr?size=260&text=" + encodeURIComponent(url.toString());
  }

  function profileFromRow(row){
    const phone = text(firstOf(row,["whatsapp","whatsapp_phone","contact_phone","phone"],""));
    const profile = {
      slug: normSlug(firstOf(row,["slug"],"")),
      display_name: text(firstOf(row,["display_name","public_label","name","title"],"")),
      city: text(firstOf(row,["city","zone","quartier","location"],"")),
      trade: text(firstOf(row,["trade","activity","job_title","profession"],"")),
      region: text(firstOf(row,["region","city_zone"],"")),
      sector: text(firstOf(row,["sector","category"],"")),
      bio: text(firstOf(row,["bio","description","short_description","about"],"")),
      photo_url: maybeUrl(firstOf(row,["photo_url","photo","image_url","cover_url"],"")),
      badge: text(firstOf(row,["badge","tagline","headline_badge"],"")),
      hub_badge: text(firstOf(row,["hub_badge","public_badge"],"")),
      price_label: text(firstOf(row,["price_label","price_text","offer_label"],"")),
      phone,
      tags: parseTags(firstOf(row,["tags","keywords","tag_list"],[]))
    };

    return profile;
  }

  function renderStatus(message){
    $app.innerHTML = `<div class="status">${message}</div>`;
  }

  function renderProfile(profile){
    const photo = maybeUrl(profile.photo_url) || DEFAULT_PHOTO;
    const wa = waLink(profile.phone, profile);

    const chips = [];
    chips.push(`<span class="chip ok">Contact direct</span>`);
    chips.push(`<span class="chip gold">0% commission</span>`);
    if(profile.hub_badge) chips.push(`<span class="chip gold">${escapeHtml(profile.hub_badge)}</span>`);
    else if(profile.badge) chips.push(`<span class="chip">${escapeHtml(profile.badge)}</span>`);
    if(profile.price_label) chips.push(`<span class="chip">${escapeHtml(profile.price_label)}</span>`);
    else chips.push(`<span class="chip">Paiement direct au pro</span>`);
    (profile.tags || []).slice(0,8).forEach((tag)=>chips.push(`<span class="chip">${escapeHtml(tag)}</span>`));

    const actionButtons = [
      wa ? `<a class="btn green" href="${escapeHtml(wa)}" target="_blank" rel="noopener noreferrer">📲 WhatsApp direct</a>` : "",
      `<a class="btn primary" href="${escapeHtml(requestUrl(profile))}">📄 Décrire mon besoin</a>`,
      `<a class="btn secondary" href="${escapeHtml(listingUrl(profile))}">👁️ Voir dans la galerie</a>`,
      `<button class="btn secondary" type="button" id="shareBtn">📤 Partager la fiche</button>`
    ].filter(Boolean).join("");

    $app.innerHTML = `
      <section class="hero">
        <div class="cover">
          <img
            src="${escapeHtml(photo)}"
            alt="${escapeHtml(profile.display_name || "Fiche service")}"
            onerror="this.onerror=null;this.src='${escapeHtml(DEFAULT_PHOTO)}';"
          />
          <div class="coverInner">
            <div class="logoLine">
              <img class="logo" src="${escapeHtml(LOGO)}" alt="Logo DIGIYLYFE"/>
              <span class="kicker">DIGIY BUILD · fiche publique</span>
            </div>

            <h1>${escapeHtml(profile.display_name || "Je propose mes services")}</h1>
            <div class="trade">${escapeHtml(profile.trade || "Service utile")}</div>

            <div class="meta">
              <span>📍 ${escapeHtml(profile.city || "Zone non précisée")}</span>
              ${profile.region ? `<span>${escapeHtml(profile.region)}</span>` : ""}
              ${profile.sector ? `<span>${escapeHtml(profile.sector)}</span>` : ""}
            </div>
          </div>
        </div>
      </section>

      <section class="main">
        <div>
          <div class="card">
            <h2>Présentation</h2>
            <div class="text">
              ${escapeHtml(profile.bio || "Professionnel visible pour travaux, dépannage, entretien, chantier et services pratiques.")}
            </div>
            <div class="chips">
              ${chips.join("")}
            </div>
          </div>

          <div class="card">
            <h2>Pourquoi passer par DIGIY ?</h2>
            <div class="text">
              Le contact reste direct avec le professionnel. DIGIY aide à rendre le service visible,
              clair et facile à partager. Le paiement reste direct au pro : 0% commission.
            </div>
          </div>
        </div>

        <aside>
          <div class="card">
            <h2>Prochain geste</h2>
            <div class="actions">
              ${actionButtons}
            </div>

            <div class="infoLine">
              <b>Contact</b>
              <span>${profile.phone ? escapeHtml(profile.phone) : "Contact direct via demande DIGIY"}</span>
            </div>

            <div class="infoLine">
              <b>Repère fiche</b>
              <span>${escapeHtml(profile.slug || "fiche-build")}</span>
            </div>

            <div class="qrBox">
              <img src="${escapeHtml(qrUrl())}" alt="QR de la fiche publique"/>
            </div>
          </div>
        </aside>
      </section>

      <div class="footer">
        DIGIY BUILD · contact direct · paiement direct au pro · 0% commission · le terrain garde la main.
      </div>
    `;

    const shareBtn = document.getElementById("shareBtn");
    if(shareBtn){
      shareBtn.addEventListener("click", async () => {
        const shareData = {
          title: profile.display_name || "Fiche DIGIY BUILD",
          text: "Fiche service DIGIY BUILD : " + (profile.display_name || profile.trade || ""),
          url: location.href
        };

        try{
          if(navigator.share){
            await navigator.share(shareData);
            return;
          }
        }catch(_){}

        try{
          await navigator.clipboard.writeText(location.href);
          shareBtn.textContent = "✅ Lien copié";
        }catch(_){
          window.open("https://wa.me/?text=" + encodeURIComponent(shareData.text + " " + location.href), "_blank", "noopener");
        }
      });
    }
  }

  async function load(){
    const params = new URLSearchParams(location.search);
    const slug = normSlug(params.get("slug") || "");

    if(!slug){
      renderStatus(`Aucun repère de fiche reçu.<br><br><a class="btn primary" href="./listing.html">👁️ Voir la galerie BUILD</a>`);
      return;
    }

    try{
      if(!window.supabase || typeof window.supabase.createClient !== "function"){
        renderStatus("Supabase indisponible pour charger cette fiche.");
        return;
      }

      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth:{persistSession:false,autoRefreshToken:false}
      });

      const { data, error } = await client
        .from(PUBLIC_TABLE)
        .select("*")
        .eq("slug", slug)
        .eq("is_published", true)
        .limit(1)
        .maybeSingle();

      if(error){
        renderStatus(`Impossible de charger la fiche : <b>${escapeHtml(error.message || error)}</b><br><br><a class="btn primary" href="./listing.html">👁️ Retour galerie</a>`);
        return;
      }

      if(!data){
        renderStatus(`Aucune fiche publiée ne correspond à : <b>${escapeHtml(slug)}</b>.<br><br><a class="btn primary" href="./listing.html">👁️ Retour galerie</a>`);
        return;
      }

      renderProfile(profileFromRow(data));
    }catch(error){
      renderStatus(`Erreur réseau : <b>${escapeHtml(error?.message || error)}</b><br><br><a class="btn primary" href="./listing.html">👁️ Retour galerie</a>`);
    }
  }

  load();
})();
</script>
</body>
</html>
