name: Intégrer Mbaye dans l’index BUILD

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/integrate-mbaye-index.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Ajouter Mbaye sans doublon
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if 'id="mbaye-diouf"' in text:
              raise SystemExit('Mbaye est déjà présent dans index.html')

          text = text.replace(
              '<meta name="digiy-build" content="build-index-verite-build-photo-webp-disponibilite-pin-20260710">',
              '<meta name="digiy-build" content="build-index-mbaye-carte-supabase-20260714">',
              1,
          )

          hero_anchor = '<a href="https://babacar-plombier-pro.digiylyfe.com/" class="cta-btn primary" target="_blank" rel="noopener noreferrer">🧰 Babacar plombier</a>'
          if hero_anchor in text:
              text = text.replace(
                  hero_anchor,
                  hero_anchor + '\n            <a href="https://mbaye-macon.digiylyfe.com/" class="cta-btn primary" target="_blank" rel="noopener noreferrer">🏗️ Mbaye entrepreneur</a>',
                  1,
              )

          qr_anchor = '<a class="cta-btn secondary" href="https://babacar-plombier-pro.digiylyfe.com/" target="_blank" rel="noopener noreferrer">🧰 Voir Babacar</a>'
          if qr_anchor in text:
              text = text.replace(
                  qr_anchor,
                  qr_anchor + '\n          <a class="cta-btn secondary" href="https://mbaye-macon.digiylyfe.com/" target="_blank" rel="noopener noreferrer">🏗️ Voir Mbaye</a>',
                  1,
              )

          first = text.find('<article class="card featured-profile">')
          second = text.find('<article class="card">', first + 1)
          if first < 0 or second < 0:
              raise SystemExit('Point d’insertion de la carte introuvable')

          mbaye = '''<article class="card featured-profile" id="mbaye-diouf">
            <a class="profile-photo" href="https://mbaye-macon.digiylyfe.com/" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir la fiche officielle de Mbaye Diouf">
              <img
                src="https://mbaye-macon.digiylyfe.com/carte-visite.png?v=20260714"
                alt="Carte de visite officielle de Mbaye Diouf — entrepreneur maçon"
                loading="lazy"
                onerror="this.onerror=null;this.src='https://digiylyfe.net/wp-content/uploads/2026/05/ChatGPT-Image-14-mai-2026-03_56_26.png';"
              />
            </a>
            <div class="name">🏗️ Mbaye Diouf</div>
            <div class="type">Entrepreneur maçon • Villas • Piscines béton • Rénovation • Finitions</div>
            <div class="badges">
              <div class="badge badge-verified">✅ Fiche officielle</div>
              <div class="badge badge-public">📌 Profil publié</div>
              <div class="badge badge-public">📲 Carte + QR DIGIY</div>
              <div class="badge badge-info">Saly · Mbour · Thiès</div>
              <div class="badge badge-info">0% commission</div>
            </div>
            <div class="direct-phone">WhatsApp direct : +221 77 642 71 13</div>
            <div class="desc">
              Construction de villas, piscines béton, rénovation, extensions et finitions haut de gamme.
              Le client ouvre la fiche officielle, consulte la carte et contacte directement Mbaye pour organiser une visite et un devis.
            </div>
            <div class="actions">
              <a class="btn btn-primary" href="https://mbaye-macon.digiylyfe.com/" target="_blank" rel="noopener noreferrer">👁️ Ouvrir sa fiche</a>
              <a class="btn btn-green" href="https://wa.me/221776427113?text=Bonjour%20Mbaye%2C%20je%20viens%20de%20votre%20fiche%20DIGIY%20BUILD%20pour%20un%20projet%20de%20construction%20ou%20de%20r%C3%A9novation." target="_blank" rel="noopener noreferrer">💬 WhatsApp direct</a>
              <button class="btn btn-ghost" id="mbayeShareBtn" type="button">📤 Partager la fiche</button>
              <a class="btn btn-ghost" href="./request.html?slug=partenaires-mbaye&amp;nom=Mbaye%20Diouf&amp;metier=Entrepreneur%20ma%C3%A7on&amp;ville=Saly">📄 Décrire mon besoin</a>
            </div>
          </article>

          '''
          text = text[:second] + mbaye + text[second:]

          metier_anchor = '<span class="metier">Maçon</span>'
          if metier_anchor in text:
              text = text.replace(
                  metier_anchor,
                  metier_anchor + '\n        <span class="metier">Mbaye Diouf · Entrepreneur maçon</span>',
                  1,
              )

          script_anchor = '<script src="https://pro-action-digiy.digiylyfe.com/assets/js/digiy-retour-voix.js?v=retour-voix-20260606-v3" defer></script>'
          if script_anchor not in text:
              raise SystemExit('Point d’insertion du partage introuvable')

          share = '''<script>
    (function(){
      "use strict";
      const btn = document.getElementById("mbayeShareBtn");
      if(!btn) return;

      const url = "https://mbaye-macon.digiylyfe.com/";
      const title = "Mbaye Diouf — DIGIY BUILD";
      const message = "Entrepreneur maçon · villas · piscines · rénovation · Saly, Mbour et Thiès · contact direct.";

      btn.addEventListener("click", async function(){
        try{
          if(navigator.share){
            await navigator.share({title:title, text:message, url:url});
            return;
          }
        }catch(_){}

        try{
          await navigator.clipboard.writeText(title + "\\n" + message + "\\n" + url);
          btn.textContent = "✅ Lien copié";
          setTimeout(function(){ btn.textContent = "📤 Partager la fiche"; }, 1800);
        }catch(_){
          window.open("https://wa.me/?text=" + encodeURIComponent(title + "\\n" + message + "\\n" + url), "_blank", "noopener");
        }
      });
    })();
  </script>
'''
          text = text.replace(script_anchor, share + script_anchor, 1)

          if text.count('id="mbaye-diouf"') != 1:
              raise SystemExit('La carte Mbaye doit apparaître exactement une fois')
          if text.count('id="mbayeShareBtn"') != 1:
              raise SystemExit('Le bouton de partage Mbaye doit apparaître exactement une fois')
          if text.count('src="https://mbaye-macon.digiylyfe.com/carte-visite.png?v=20260714"') != 1:
              raise SystemExit('L’image de carte Mbaye doit apparaître exactement une fois')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Valider et publier
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'build-index-mbaye-carte-supabase-20260714' index.html
          test "$(grep -o 'id="mbaye-diouf"' index.html | wc -l)" -eq 1
          test "$(grep -o 'id="mbayeShareBtn"' index.html | wc -l)" -eq 1
          test "$(grep -o 'carte-visite.png?v=20260714' index.html | wc -l)" -eq 1

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/integrate-mbaye-index.yml
          git add index.html
          git commit -m "Afficher Mbaye dans l’index DIGIY BUILD"
          git push
